<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="red-spiral-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="50%" stop-color="#ff2a3b"/>
      <stop offset="100%" stop-color="#d6001c"/>
    </linearGradient>
    <filter id="red-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#red-glow)">
    <!-- Swirl spiral main path -->
    <path d="M 240 440 C 130 430 50 340 50 230 C 50 120 145 40 260 40 C 340 40 405 80 420 130 C 375 75 295 65 220 85 C 135 110 80 185 85 270 C 90 345 155 405 230 410 C 315 415 390 355 400 270 C 405 210 380 160 335 130 C 375 160 385 220 375 270 C 360 335 300 380 230 380 C 170 380 125 335 125 270 C 125 210 165 165 225 160 C 275 155 320 185 325 235 C 330 275 300 310 260 315 C 225 320 195 295 195 260 C 195 235 210 215 235 210 C 250 207 265 215 265 230 C 265 240 255 248 245 248" fill="none" stroke="url(#red-spiral-grad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Large Sparkle Star -->
    <path d="M 370 65 Q 370 95 340 95 Q 370 95 370 125 Q 370 95 400 95 Q 370 95 370 65 Z" fill="url(#red-spiral-grad)"/>

    <!-- Small Sparkle Star -->
    <path d="M 430 115 Q 430 135 410 135 Q 430 135 430 155 Q 430 135 450 135 Q 430 135 430 115 Z" fill="url(#red-spiral-grad)"/>
  </g>
</svg>
